<div class="pet-container" id="petContainer" role="button" tabindex="0" aria-label="Digital pet dog - click for a message" onclick="petSpeak()" onkeydown="if(event.key==='Enter'||event.key===' ')petSpeak()">
  <div class="pet-bubble" id="petBubble" aria-live="polite"></div>
  <svg class="pet-dog" id="petDog" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
    <!-- Pixel dog: 4px per "pixel" unit, drawn on a 16x16 grid scaled to 64x64 -->
    <!-- Ears -->
    <rect x="8"  y="4"  width="8" height="8" fill="#8B6914"/>
    <rect x="8"  y="4"  width="4" height="4" fill="#6B4F10"/>
    <rect x="48" y="4"  width="8" height="8" fill="#8B6914"/>
    <rect x="52" y="4"  width="4" height="4" fill="#6B4F10"/>
    <!-- Head -->
    <rect x="16" y="8"  width="32" height="24" fill="#C8952A"/>
    <!-- Forehead shading -->
    <rect x="16" y="8"  width="32" height="4"  fill="#D4A438"/>
    <!-- Eyes -->
    <rect x="20" y="16" width="8"  height="8"  fill="#2C1810"/>
    <rect x="36" y="16" width="8"  height="8"  fill="#2C1810"/>
    <!-- Eye shine -->
    <rect x="22" y="17" width="3"  height="3"  fill="#FFFFFF"/>
    <rect x="38" y="17" width="3"  height="3"  fill="#FFFFFF"/>
    <!-- Snout -->
    <rect x="20" y="24" width="24" height="8"  fill="#E8B85A"/>
    <!-- Nose -->
    <rect x="28" y="24" width="8"  height="4"  fill="#2C1810"/>
    <!-- Mouth -->
    <rect x="24" y="30" width="4"  height="2"  fill="#2C1810"/>
    <rect x="36" y="30" width="4"  height="2"  fill="#2C1810"/>
    <!-- Tongue -->
    <rect x="28" y="30" width="8"  height="4"  fill="#E8507A"/>
    <!-- Body -->
    <rect x="12" y="32" width="40" height="20" fill="#C8952A"/>
    <!-- Body shading top -->
    <rect x="12" y="32" width="40" height="4"  fill="#B8851A"/>
    <!-- Collar -->
    <rect x="12" y="32" width="40" height="4"  fill="#E84040"/>
    <rect x="28" y="32" width="8"  height="4"  fill="#F0B000"/>
    <!-- Tail -->
    <rect x="52" y="28" width="8"  height="4"  fill="#C8952A"/>
    <rect x="56" y="24" width="8"  height="8"  fill="#C8952A"/>
    <rect x="60" y="20" width="4"  height="8"  fill="#D4A438"/>
    <!-- Front legs -->
    <rect x="16" y="52" width="8"  height="12" fill="#B8851A"/>
    <rect x="16" y="60" width="8"  height="4"  fill="#8B6914"/>
    <rect x="40" y="52" width="8"  height="12" fill="#B8851A"/>
    <rect x="40" y="60" width="8"  height="4"  fill="#8B6914"/>
  </svg>
</div>

<style>
.pet-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 72px;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.pet-dog {
  width: 72px;
  height: 72px;
  animation: petBounce 2s ease-in-out infinite;
  transition: transform 0.15s ease;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.18));
}

.pet-container:hover .pet-dog,
.pet-container:focus .pet-dog {
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.28));
}

@keyframes petBounce {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-6px); }
}

@keyframes petJump {
  0%   { transform: translateY(0px) scale(1); }
  30%  { transform: translateY(-18px) scale(1.05, 0.95); }
  60%  { transform: translateY(-4px) scale(0.97, 1.03); }
  80%  { transform: translateY(-8px) scale(1.02, 0.98); }
  100% { transform: translateY(0px) scale(1); }
}

.pet-dog.jumping {
  animation: petJump 0.5s ease forwards;
}

.pet-bubble {
  position: absolute;
  bottom: 80px;
  right: 0;
  background: var(--theme, #fff);
  color: var(--primary, #1a1a1a);
  border: 1.5px solid var(--border, #e0e0e0);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 0.82rem;
  line-height: 1.45;
  max-width: 220px;
  min-width: 140px;
  text-align: left;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
  word-break: break-word;
}

.pet-bubble::after {
  content: '';
  position: absolute;
  bottom: -8px;
  right: 28px;
  width: 0;
  height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 8px solid var(--border, #e0e0e0);
}

.pet-bubble::before {
  content: '';
  position: absolute;
  bottom: -6px;
  right: 29px;
  width: 0;
  height: 0;
  border-left: 7px solid transparent;
  border-right: 7px solid transparent;
  border-top: 7px solid var(--theme, #fff);
  z-index: 1;
}

.pet-bubble.visible {
  opacity: 1;
}

/* Smaller on mobile */
@media (max-width: 480px) {
  .pet-container {
    bottom: 16px;
    right: 16px;
    width: 54px;
  }
  .pet-dog {
    width: 54px;
    height: 54px;
  }
  .pet-bubble {
    bottom: 62px;
    max-width: 180px;
    font-size: 0.78rem;
  }
}
</style>

<script>
(function() {
  var messages = [
    "Have you cited my papers today?",
    "Another deadline survived.",
    "Sleep is just a local minimum.",
    "Digital twins do not have to attend meetings.",
    "I fetch papers, not balls.",
    "404: social life not found.",
    "Gradient descent is my cardio.",
    "My model converges. Does yours?",
    "Keep calm and cite your sources.",
    "Currently running on caffeine and curiosity.",
    "Ph.D. stands for Probably half-Done.",
    "Still a better optimizer than Adam.",
    "The loss is going down. I can feel it.",
    "Have you pushed to GitHub today?",
    "Woof. I mean, hello.",
    "Training... please do not interrupt.",
    "Overfitting on life, send help.",
    "I know a lot about network digital twins. Ask me anything.",
    "No free lunch. Especially not at conferences.",
    "Convergence is temporary. Papers are forever."
  ];

  var lastIdx = -1;
  var hideTimer = null;

  window.petSpeak = function() {
    var dog = document.getElementById('petDog');
    var bubble = document.getElementById('petBubble');
    if (!dog || !bubble) return;

    // Jump animation
    dog.classList.remove('jumping');
    void dog.offsetWidth; // reflow
    dog.classList.add('jumping');
    dog.addEventListener('animationend', function onEnd() {
      dog.classList.remove('jumping');
      dog.removeEventListener('animationend', onEnd);
    });

    // Pick a random message (avoid repeating the last one)
    var idx;
    do { idx = Math.floor(Math.random() * messages.length); } while (idx === lastIdx && messages.length > 1);
    lastIdx = idx;

    bubble.textContent = messages[idx];
    bubble.classList.add('visible');

    if (hideTimer) clearTimeout(hideTimer);
    hideTimer = setTimeout(function() {
      bubble.classList.remove('visible');
    }, 3500);
  };
})();
</script>
