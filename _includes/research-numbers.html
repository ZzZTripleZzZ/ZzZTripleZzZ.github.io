<!-- Research in Numbers — Animated Counter Section
     Edit data-target values to reflect your actual stats.
     The .stat-number text is set by JS counter animation on scroll-in.
     The suffix (e.g. "+") is rendered as a separate .stat-suffix span.
-->
<section class="research-numbers" aria-label="Research Statistics">
  <div class="stat-item" data-target="14">
    <span class="stat-number">0</span><span class="stat-suffix">+</span>
    <span class="stat-label">Publications</span>
  </div>
  <div class="stat-item" data-target="2">
    <span class="stat-number">0</span>
    <span class="stat-label">Major Awards</span>
  </div>
  <div class="stat-item" data-target="5">
    <span class="stat-number">0</span>
    <span class="stat-label">Invited Talks</span>
  </div>
  <div class="stat-item" data-target="3">
    <span class="stat-number">0</span>
    <span class="stat-label">Active Projects</span>
  </div>
</section>
