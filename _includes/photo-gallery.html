<!-- Photo Gallery — Responsive Masonry Layout
     Replace placeholder <img> src URLs with your actual photo paths, e.g.:
       src="/images/gallery/tokyo-2024.jpg"
     Add a caption in .gallery-item__caption for each photo.
     To add rows: duplicate <div class="gallery-item"> blocks.
     Heights vary intentionally to create a masonry stagger effect.
     CSS columns layout handles reflow across all screen sizes automatically.
-->
