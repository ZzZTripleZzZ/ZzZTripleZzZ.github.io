name: Update Citation Counts

on:
  schedule:
    - cron: '0 0 * * 1'   # Every Monday at 00:00 UTC
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: write

jobs:
  update-citations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scholarly
        run: pip install scholarly

      - name: Update citations
        continue-on-error: true
        run: python scripts/update_citations.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/citations.json
          git diff --staged --quiet || git commit -m "chore: update citation counts [skip ci]"
          git push
