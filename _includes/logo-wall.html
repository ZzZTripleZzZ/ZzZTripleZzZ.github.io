<!-- Institution Logo Wall
     Replace each <svg> with an actual <img> tag pointing to your logo file, e.g.:
       <img src="/assets/images/logos/ncsu.svg" alt="NC State University" width="120" height="48">
     Current SVGs are styled text placeholders in institutional colors.
     Hover restores full color; default state is grayscale.
-->
<section class="logo-wall" aria-label="Affiliated Institutions">
  <p class="logo-wall__title">Affiliations &amp; Collaborations</p>
  <div class="logo-wall__row">

    <!-- NC State University -->
    <figure class="logo-item" title="NC State University">
      <svg xmlns="http://www.w3.org/2000/svg" width="120" height="48" viewBox="0 0 120 48" aria-label="NC State University">
        <rect width="120" height="48" rx="4" fill="#CC0000"/>
        <text x="60" y="20" font-family="Arial,sans-serif" font-size="11" font-weight="700"
              fill="#ffffff" text-anchor="middle" dominant-baseline="middle">NC STATE</text>
        <text x="60" y="35" font-family="Arial,sans-serif" font-size="8.5"
              fill="#ffffff" text-anchor="middle" dominant-baseline="middle">UNIVERSITY</text>
      </svg>
      <figcaption>NC State</figcaption>
    </figure>

    <!-- The Ohio State University -->
    <figure class="logo-item" title="The Ohio State University">
      <svg xmlns="http://www.w3.org/2000/svg" width="120" height="48" viewBox="0 0 120 48" aria-label="The Ohio State University">
        <rect width="120" height="48" rx="4" fill="#BA0C2F"/>
        <text x="60" y="20" font-family="Arial,sans-serif" font-size="11" font-weight="700"
              fill="#ffffff" text-anchor="middle" dominant-baseline="middle">THE OHIO</text>
        <text x="60" y="35" font-family="Arial,sans-serif" font-size="8.5"
              fill="#ffffff" text-anchor="middle" dominant-baseline="middle">STATE UNIVERSITY</text>
      </svg>
      <figcaption>Ohio State</figcaption>
    </figure>

    <!-- Oak Ridge National Laboratory -->
    <figure class="logo-item" title="Oak Ridge National Laboratory">
      <svg xmlns="http://www.w3.org/2000/svg" width="120" height="48" viewBox="0 0 120 48" aria-label="Oak Ridge National Laboratory">
        <rect width="120" height="48" rx="4" fill="#005B8E"/>
        <text x="60" y="20" font-family="Arial,sans-serif" font-size="11" font-weight="700"
              fill="#ffffff" text-anchor="middle" dominant-baseline="middle">OAK RIDGE</text>
        <text x="60" y="35" font-family="Arial,sans-serif" font-size="7.5"
              fill="#ffffff" text-anchor="middle" dominant-baseline="middle">NAT'L LABORATORY</text>
      </svg>
      <figcaption>ORNL</figcaption>
    </figure>

    -->

  </div>
</section>
